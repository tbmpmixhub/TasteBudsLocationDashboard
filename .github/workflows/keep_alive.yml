name: Keepalive
on:
  schedule:
    - cron: "0 0 */50 * *"
  workflow_dispatch:
jobs:
  keepalive:
    name: Keepalive Workflow
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
