name: Keepalive
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
jobs:
  keepalive:
    name: Keepalive Workflow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: keepalive
          fetch-depth: 0
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull origin keepalive --rebase
          git commit --allow-empty -m "Keep Alive Commit"
          git push origin keepalive
